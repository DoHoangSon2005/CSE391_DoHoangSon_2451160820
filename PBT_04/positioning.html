<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning</title>

    <link rel="stylesheet" href="positioning.css">
</head>

<body>

    <header class="header">

        <div class="logo">
            ShopTLU
        </div>

        <nav class="nav">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>

    </header>

    <div class="container">

        <aside class="sidebar">
            <h2>Danh mục</h2>
            <p>Sp1</p>
            <p>Sp2</p>
            <p>Sp3</p>
        </aside>

        <main class="content">

            <div class="card">

                <div class="badge">
                    HOT
                </div>

                <img src="https://placehold.co/300x200" alt="Sản phẩm">

                <h2>SP</h2>

                <p>1.000.000đ</p>

            </div>

            <div class="long-content">
                Nội dung 
            </div>

        </main>

    </div>

    <button class="top-btn">
        ↑
    </button>

</body>
</html>

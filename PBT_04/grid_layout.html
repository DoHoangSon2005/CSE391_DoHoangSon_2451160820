<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <link rel="stylesheet" href="grid.css">
</head>

<body>

    <div class="container">

        <header class="header">
            Header
        </header>

        <section class="hero">
            Hero Banner
        </section>

        <aside class="sidebar">

            <h3>SIDEBAR </h3>

            <label>
                <input type="checkbox">
                1
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                2
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                3
            </label>

        </aside>

        <main class="main">

            <div class="card featured">
                <img src="https://placehold.co/600x400" alt="">
                <h3>Sản phẩm nổi bật</h3>
                <p>20.000.000đ</p>
            </div>

            <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 1</h3>
                <p>1.000.000đ</p>
            </div>

            <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 2</h3>
                <p>2.000.000đ</p>
            </div>

            <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 3</h3>
                <p>3.000.000đ</p>
            </div>

            <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 4</h3>
                <p>4.000.000đ</p>
            </div>

            <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 5</h3>
                <p>5.000.000đ</p>
            </div>

             <div class="card">
                <img src="https://placehold.co/300x200" alt="">
                <h3>Sản phẩm 6</h3>
                <p>5.000.000đ</p>
            </div>

        </main>

        <aside class="ads">

            <img src="https://placehold.co/180x400" alt="ads">
            <h3>ADS</h3>

        </aside>

        <footer class="footer">
            Footer
        </footer>

    </div>

</body>
</html>

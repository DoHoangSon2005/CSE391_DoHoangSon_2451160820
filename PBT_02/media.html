<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<h2>Hình ảnh</h2>
<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 1" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>Sản phẩm 1</figcaption>
</figure>
<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 2" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>Sản phẩm 2</figcaption>
</figure>
<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 3" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>Sản phẩm 3</figcaption>
</figure>

<h2>Video YouTube</h2>
<iframe width="400" height="250" src="https://www.youtube.com" allowfullscreen>
</iframe>

<h2>Video sản phẩm</h2>
<video controls width="400" poster="https://placehold.co/400x250">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt không hỗ trợ video
</video>

<h2>Âm thanh</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio
</audio>

<h2>SVG</h2>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" fill="blue" />
</svg>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <h1>Form đăng ký</h1>
    <form action="#" method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Họ tên:</label><br>
            <input type="text" id="name" placeholder="Nhập họ tên" required minlength="2" maxlength="50"><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="12345@gmail.com" required><br><br>
            <label for="phone">SĐT:</label><br>
            <input type="tel" id="phone" placeholder="1234567890" pattern="[0-9]{10}"><br><br>
            <label for="birthdate">Ngày sinh:</label><br>
            <input type="date" id="birthdate" max="2026-12-31"><br><br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="user">Username:</label><br>
            <input type="text" id="user" placeholder="username" pattern="[A-Za-z0-9_]{3,20}"><br><br>
            <label for="pass">Password:</label><br>
            <input type="password" id="pass" placeholder="Mật khẩu" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"><br><br>
            <label for="repass">Xác nhận password:</label><br>
            <input type="password" id="repass" placeholder="Nhập lại mật khẩu" minlength="8"><br><br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label><br>
            <select id="city">
                <option>Hà Nội</option>
                <option>TP.HCM</option>
                <option>Đà Nẵng</option>
                <option>Hải Phòng</option>
                <option>Cần Thơ</option>
            </select><br><br>
            <label for="district">Quận/Huyện:</label><br>
            <select id="district">
                <option>Cầu Giấy</option>
                <option>Ba Đình</option>
                <option>Đống Đa</option>
            </select><br><br>
            <label for="address">Địa chỉ:</label><br>
            <textarea id="address" rows="3"
                      placeholder="Nhập địa chỉ"></textarea><br><br>
            <p>Giới tính:</p>
            <input type="radio" name="gender" id="nam">
            <label for="nam">Nam</label>
            <input type="radio" name="gender" id="nu">
            <label for="nu">Nữ</label>
            <input type="radio" name="gender" id="khac">
            <label for="khac">Khác</label><br><br>
        </fieldset>
        <br>

        <input type="checkbox" id="agree" required>
        <label for="agree">Tôi đồng ý điều khoản</label><br><br>
        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>
    </form>
</body>
</html>

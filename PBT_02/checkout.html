<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>

<body>

<h1>Đặt hàng</h1>

<h2>Giỏ hàng</h2>

<table border="1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16</td>
            <td>25.000.000</td>
            <td>1</td>
            <td>25.000.000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>AirPods</td>
            <td>5.000.000</td>
            <td>2</td>
            <td>10.000.000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Sạc iphone </td>
            <td>500.000</td>
            <td>1</td>
            <td>500.000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4">Tổng cộng</td>
            <td>35.500.000</td>
        </tr>
    </tfoot>
</table>

<br>

<h2>Thanh toán</h2>

<form>

    <p>Phương thức thanh toán:</p>
    <input type="radio" id="cod" name="pay">
    <label for="cod">COD</label>
    <input type="radio" id="bank" name="pay">
    <label for="bank">Chuyển khoản</label>
    <input type="radio" id="wallet" name="pay">
    <label for="wallet">Ví điện tử</label>

    <br><br>

    <label for="coupon">Mã giảm giá:</label>
    <input type="text" id="coupon" name="coupon"
           placeholder="SALE2026"
           pattern="SALE[0-9]{4}">

    <br><br>

    <label for="note">Ghi chú:</label>
    <textarea id="note" name="note" placeholder="Ghi chú"></textarea>

    <br><br>

    <h2>Giao hàng</h2>

    <label for="date">Ngày giao hàng:</label>
    <input type="date" id="date" name="date"
           min="2026-01-25">

    <br><br>

    <label for="time">Khung giờ:</label>
    <select id="time" name="time">
        <option>Sáng 8-12h</option>
        <option>Chiều 14-18h</option>
        <option>Tối 18-21h</option>
    </select>

    <br><br>

    <label for="days">Thời gian giao (số ngày):</label>
    <input type="range" id="days" name="days" min="1" max="7" step="1">

    <br><br>

    <button type="submit" aria-label="Xác nhận đặt hàng">
        Đặt hàng
    </button>

</form>

</body>
</html>
